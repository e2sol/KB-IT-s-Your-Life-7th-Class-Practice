<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      window.onload = function () {
        let clock = document.getElementById('clock');
        console.log(clock);
        // 단위시간마다 반복해서 실행
        // setInterval(함수, 지연시간(ms)); > 지연시간 후 함수 실행
        setInterval(function () {
          let now = new Date();
          // HTML 태그 내부에 내용으로 현재 시간이 들어가야 함
          // innerHTML을 작성해야 지정한 HTML 태그로 들어감
          clock.innerHTML = now.toString();
        }, 1000); // 1000은 단위 시간. 밀리초 단위이므로 1000은 1초를 의미
      };
    </script>
  </head>
  <body>
    <h1 id="clock"></h1>
  </body>
</html>
