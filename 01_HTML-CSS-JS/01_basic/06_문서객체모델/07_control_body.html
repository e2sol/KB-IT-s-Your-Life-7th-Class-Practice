<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      window.onload = function () {
        // 속성을 지정
        document.body.setAttribute('data-custom', 'value');
        // 요소.setAttribute("속성명", "속성값");
        // 해당 요소에 속성명 = "속성값" 으로 추가해 줌
        // 주석에 HTML 태그를 작성하더라도 HTML태그를 먼저 해석하는 과정에서 오류 발생

        // 속성을 추출합니다
        let dataCustom = document.body.getAttribute('data-custom');
        // 요소.getAttribute("속성명"); // 속성값 얻어오기

        alert(dataCustom);
      };
    </script>
  </head>
  <body>
    <div>practice</div>
    <script>
      // div 태그에 id 속성 추가
      // id = "practice"

      let div = document.querySelector('div');
      div.setAttribute('id', 'practice');
      div.setAttribute('class', 'pr');

      // document.getElementsByTagName()
      // 이 경우 얻어오는 요소가 하나여도 배열에 담긴다.

      // 요소 잘 얻어왔는지 콘솔에 출력해보기
      // console.log(document.getElementsByTagName('div'));
      let checking = div;
      console.log(checking);
    </script>
  </body>
</html>
