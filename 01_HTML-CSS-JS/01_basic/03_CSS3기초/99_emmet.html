<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!-- ul>li*6 + Enter 시 자동 완성 -->
    <ul>
      <li></li>
      <li></li>
      <li></li>
      <li></li>
      <li></li>
      <li></li>
    </ul>
    <!-- 형제 node 확장자: + -->
    <!-- header+main+footer + Enter 시 자동완성 -->
    <header></header>
    <main></main>
    <footer></footer>
    <!-- ul>li.test*5 + Enter 시 자동완성 -->
    <ul>
      <li class="test"></li>
      <li class="test"></li>
      <li class="test"></li>
      <li class="test"></li>
      <li class="test"></li>
    </ul>
    <!-- ul>li#happy*5 + Enter 시 자동완성 -->
    <ul>
      <li id="happy"></li>
      <li id="happy"></li>
      <li id="happy"></li>
      <li id="happy"></li>
      <li id="happy"></li>
    </ul>
    <!-- ul>li{1}*10 + Enter 시 자동완성 -->
    <ul>
      <li>1</li>
      <li>1</li>
      <li>1</li>
      <li>1</li>
      <li>1</li>
      <li>1</li>
      <li>1</li>
      <li>1</li>
      <li>1</li>
      <li>1</li>
    </ul>
    <!-- ul>li{$}*10 + Enter 시 자동완성 -->
    <ul>
      <li>1</li>
      <li>2</li>
      <li>3</li>
      <li>4</li>
      <li>5</li>
      <li>6</li>
      <li>7</li>
      <li>8</li>
      <li>9</li>
      <li>10</li>
    </ul>
    <!-- ul>li#li$.li${li요소} + Enter 시 자동완성 -->
    <!-- 속성 우선순위에 의해서 id와 class 입력 순서 반전 시 인식 못함 -->
    <ul>
      <li id="li1" class="li1">li요소</li>
      <li id="li2" class="li2">li요소</li>
      <li id="li3" class="li3">li요소</li>
    </ul>
  </body>
</html>
