<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      let date = new Date();

      // 0 - 11 값을 가짐 -> +1을 통해 값 조정
      let month = date.getMonth() + 1;
      //   console.log(month);
      if (month < 3 || month == 12) {
        alert('겨울입니다.');
      } else if (month >= 3 && month < 6) {
        alert('봄입니다.');
      } else if (month > 5 && month < 9) {
        alert('여름입니다.');
      } else if (9 <= month && month < 12) {
        alert('가을입니다.');
      } else {
        alert('잘못된 월 입니다.');
      }
      // else는 없어도 괜찮다.
    </script>
  </head>
  <body>
    <h3>if - else if - else</h3>
    <pre>
        if (조건식1) {
            조건식1이 true일 때 수행할 코드
        } else if (조건식2) {
            조건식 2가 true일 대 수행할 코드
        } else {
            위의 조건식들을 모두 만족하지 않는 경우 수행할 코드
        }
    </pre>
  </body>
</html>
