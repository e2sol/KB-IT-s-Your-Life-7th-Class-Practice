<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      let a = 10;
      const Pi = 3.141592;
      //   내장된 pi 값 : Math.PI

      //   alert(a * a * Math.PI);
    </script>
  </head>
  <body>
    <h3>변수</h3>
    <pre>
        var: 변수, 변수명 중복 0(덮어쓰기), 함수 레벨
        let: 변수, 변수명 중복 x, 블록 {} 레벨
        const: 상수, 변수명 중복 x, 블록 {} 레벨

        1순위 : const
        (JS는 특정 요소를 선택해서 사용하는 경우가 많아서 상수에 고정시켜둠)
        
        2순위 : let
        
        3순위 : var
    </pre>

    <script>
      // 변수를 선언 및 초기화
      // 초기화: 처음으로 값을 할당하는 것
      let radius = 10;
      let pi = 3.14159265;

      //출력
      alert('둘레값: ' + 2 * radius * pi);
    </script>
  </body>
</html>
