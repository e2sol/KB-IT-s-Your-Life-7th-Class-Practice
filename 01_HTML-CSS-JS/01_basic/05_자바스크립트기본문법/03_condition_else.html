<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      // Date() : 현재 시간을 입력받음
      let date = new Date();
      let nowTime = date.getHours();
      //   alert(nowTime);
      if (nowTime < 12) {
        alert('오전입니다.');
      } else {
        alert('오후입니다.');
      }
    </script>
  </head>
  <body>
    <h3>조건문 if - else</h3>
    <pre>
        작성법
        if (조건식) {
            조건식이 true일 때 수행할 코드
        } else {
            조건식이 false일 대 수행할 코드
        }
    </pre>
  </body>
</html>
