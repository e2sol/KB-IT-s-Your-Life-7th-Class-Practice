<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      let array = [10, 20, 30, 40, 50];
      console.log('배열 길이: ' + array.length);
      let i = 0;
      while (i < array.length) {
        console.log(array[i]);
        i++;
      }
    </script>
  </head>
