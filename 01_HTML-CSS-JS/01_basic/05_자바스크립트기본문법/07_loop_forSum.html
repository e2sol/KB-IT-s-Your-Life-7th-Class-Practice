<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      let sum = 0; // 전역변수
      for (let i = 0; i <= 100; i++) {
        sum += i;
        // i : 지역변수
      }
      // alert(i);
      // ReferenceError : i is not defined
      // i는 for문 안에서만 사용 가능하다.
      alert(sum);
    </script>
  </head>
  <body></body>
</html>
