<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      let doubleSqure = function (x) {
        return x * x;
      };
      alert(doubleSqure(8));
    </script>
  </head>
  <body>
    <h3>함수 function</h3>
    <pre>
      function 함수명([매개변수]) { // 함수 선언

        // 함수 정의
        return 반환값;
      }

      함수명(); // 함수 호출
    </pre>
    <script>
      // 함수 선언
      function f(x) {
        return x + x; // 함수를 호출한 곳으로 반환
      }

      // 함수 호출
      alert(f(3));
    </script>
  </body>
</html>
