<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      // 리터럴 표기법 : 값을 표현하는 방법
      // 문자열 리터럴 표기법 : "", ''
      // 배열 리터럴 표기법: []
      // 객체 리터럴 표기법: {}
      let name = '한혜지';

      // 객체는 속성과 기능을 가진다.
      let person = {
        name: '홍길동',
        eat: function (food) {
          console.log(name); // 한혜지

          // 같은 객체 내부의 다른 속성을 호출하고 싶은 경우
          // 현재 객체를 뜻하는 this를 써야한다.
          alert(this.name + '이 ' + food + '을/를 먹습니다.');
        },
      };

      console.log(person.name);
      person.eat('밥');
      // 함수명 : 함수 자체
      // 함수명() : 함수 호출
    </script>
  </head>
  <body></body>
</html>
