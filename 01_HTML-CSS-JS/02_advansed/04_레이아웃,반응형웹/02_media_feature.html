<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="user-scalable=n, maximum-scale=1" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      /* and 뒤에 띄어쓰기 필수. 안 할 시 오류남 */
      @media screen and (max-width: 767px) {
        body {
          background-color: red;
        }
      }
      @media screen and (min-width: 768px) and (max-width: 959px) {
        body {
          background-color: green;
        }
      }
      @media screen and (min-width: 960px) {
        body {
          background-color: blue;
        }
      }
    </style>
  </head>
  <body>
    <h1>Lorem ipsum dolor sit amet</h1>
    <p>
      Lorem ipsum dolor, sit amet consectetur adipisicing elit. Non officia
      voluptatum sit quod, perferendis delectus aliquid, cum nostrum tenetur,
      quam id. Quas magni amet quo, a fuga eaque enim distinctio?
    </p>
  </body>
</html>
