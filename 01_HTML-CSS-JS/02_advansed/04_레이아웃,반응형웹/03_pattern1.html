<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=\, initial-scale=1.0" />
    <title>Pattern01</title>

    <style>
      * {
        padding: 0;
        margin: 0;
      }
      li {
        list-style: none;
      }
      #menu ul {
        padding-left: 0;
      }

      @media screen and (min-width: 768px) {
        body {
          display: flex;
        }
        #menu {
          width: 300px;
        }
      }
    </style>
  </head>
  <body>
    <div id="menu">
      <ul>
        <li>메뉴A</li>
        <li>메뉴B</li>
        <li>메뉴C</li>
      </ul>
    </div>
    <div id="section">
      <h1>Lorem ipsum</h1>
      <p>
        Lorem ipsum dolor sit amet, consectetur adipisicing elit. Nemo, sit,
        dolor cupiditate voluptates magnam repudiandae aliquam dolore quidem,
        officia fugit fugiat dicta quam minus iusto autem labore doloribus rerum
        quasi.
      </p>
    </div>
  </body>
</html>
