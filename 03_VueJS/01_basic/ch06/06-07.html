<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .buttonColor {
        background-color: aqua;
        color: black;
      }
      .buttonLayout {
        text-align: center;
        width: 120px;
      }
      .staticBorder {
        border: khaki dashed 1px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <input type="checkbox" v-model="checked" />레이아웃 적용 여부 <br />
      <button
        class="staticBorder"
        :class="buttonColor, checked ? buttonLayout:''"
      >
        버튼
      </button>
    </div>
    <script src="https://unpkg.com/vue"></script>
    <script>
      let vm = Vue.createApp({
        name: 'App',
        data() {
          return {
            checked: false,
            buttonColor: 'buttonColor',
            buttonLayout: 'buttonLayout',
          };
        },
      }).mount('#app');
    </script>
  </body>
</html>
