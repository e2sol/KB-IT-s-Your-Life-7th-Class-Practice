<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div id="app">
      <input type="text" v-model="name" @input="changeName" /><br />
      이름: <span>{{name}}</span>
    </div>
    <script src="https://unpkg.com/vue"></script>
    <script>
      let vm = Vue.createApp({
        name: 'App',
        data() {
          return {
            name: '',
          };
        },
        methods: {
          changeName(e) {
            this.name = e.target.value; // e.target : 이벤트가 일어나는 타겟
          },
        },
      }).mount('#app');
    </script>
  </body>
</html>
