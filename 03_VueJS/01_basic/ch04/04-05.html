<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div id="app">
      1보다 큰 수: <input type="text" v-model.number="num" /> <br />
      1부터 입력한 값까지의 합: <span>{{sum()}}</span><br />
      1부터 입력한 값까지의 합: <span>{{sum()}}</span><br />
      1부터 입력한 값까지의 합: <span>{{sum()}}</span><br />
    </div>
    <script src="https://unpkg.com/vue"></script>
    <script>
      let vm = Vue.createApp({
        name: 'App',
        data() {
          return { num: 0 };
        },
        methods: {
          // Vue 인스턴스가 사용할 함수를 정의하는 속성

          sum() {
            // sum 함수 정의

            console.log('## num : ' + this.num);
            let n = parseInt(this.num); //입력받은 num(숫자로 된 문자열)을 정수(숫자)로 변환
            if (Number.isNaN(n)) return 0; // n이 숫자가 아니라면(빈 문자열의 경우) 0을 리턴 // 비교연산자 사용이 아님. 문법 주의
            return (n * (n + 1)) / 2; // n이 숫자인 경우 1부터 n까지의 합을 리턴
          },
        },
      }).mount('#app');
    </script>
  </body>
</html>
