<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!-- font-awesome 라이브러리 가져오기 -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Bootstrap CSS 디자인, 레이아웃 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <!-- Bootstrap JS 모달, 드롭다운 -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <h1 class="mt-3"><i class="fa-regular fa-pen-to-square"></i> 새 글쓰기</h1>
    <div class="mb-3">
      <label for="newTitle" class="form-label">제목</label>
      <input type="text" class="form-control" id="newTitle" />
    </div>
    <div class="mb-3">
      <label for="newWriter" class="form-label">작성자</label>
      <input type="text" class="form-control" id="newWriter" />
    </div>
    <div class="mb-3">
      <label for="newContents" class="form-label">내용</label>
      <textarea class="form-control" id="newContents" rows="5"></textarea>
    </div>
    <div class="d-grid gap-2 d-md-block">
      <button class="btn btn-primary" type="button">
        <i class="fa-solid fa-check"></i> 확인
      </button>
      <button class="btn btn-primary" type="button">
        <i class="fa-solid fa-arrow-rotate-left"></i> 취소
      </button>
      <button class="btn btn-primary" type="button">
        <i class="fa-solid fa-list"></i> 목록
      </button>
    </div>
  </body>
</html>
