<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!-- font-awesome 라이브러리 가져오기 -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Bootstrap CSS 디자인, 레이아웃 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <!-- Bootstrap JS 모달, 드롭다운 -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div class="mt-3 d-grid gap-2 col-6 mx-auto">
      <h1><i class="fa-solid fa-right-to-bracket"></i> 로그인</h1>
      <label for="inputUserId" class="form-label mt-4"
        ><i class="fa-solid fa-user"></i> 사용자 ID:</label
      >
      <input
        type="text"
        id="inputUserId"
        class="form-control"
        aria-describedby="passwordHelpBlock"
      />
      <label for="inputPw" class="form-label mt-3"
        ><i class="fa-solid fa-lock"></i> 비밀번호:</label
      >
      <input
        type="password"
        id="inputPw"
        class="form-control"
        aria-describedby="passwordHelpBlock"
      />
      <div class="d-grid gap-2">
        <button class="btn btn-primary" type="button">
          <i class="fa-solid fa-right-to-bracket"></i> 로그인
        </button>
      </div>
    </div>
  </body>
</html>
