<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>06-11</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/bootstrap@5.2.3/dist/css/bootstrap.min.css"
    />
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: sans-serif;
      }
      .title {
        text-align: center;
        font-weight: bold;
        font-size: 20pt;
      }
      .todo-done {
        text-decoration: line-through;
      }
      .container {
        padding: 10px 10px 10px 10px;
      }
      .panel-borderless {
        border: 0;
        box-shadow: none;
      }
      .pointer {
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="app" class="container">
      <div class="card card-body bg-light">
        <div classe="title">:: Todolist App</div>
      </div>
      <div class="card card-default card-borderless">
        <div class="card-body">
          <!-- 새 할 일 추가-->
          <input
            type="text"
            placeholder="할 일을 여기에 입력!"
            v-model="todo"
            @keyup.enter="addTodo"
          />
          <button @click="addTodo">추가</button>
          <!-- 할 일 목록-->
          <div>
            <ul>
              <li v-for="td in todolist">{{td.todo}}</li>
            </ul>
          </div>
        </div>
      </div>
    </div>
    <script type="text/javascript">
      var ts = new Date().getTime();
      var vm = Vue.createApp({
        name: 'App',
        data() {
          return {
            todo: '',
            todolist: [
              { id: ts, todo: '자전거 타기', completed: false },
              { id: ts + 1, todo: '딸과 공원 산책', completed: true },
              { id: ts + 2, todo: '일요일 애견 카페', completed: false },
              { id: ts + 3, todo: 'Vue 원고 집필', completed: false },
            ],
          };
        },
        methods: {
          addTodo() {
            this.todolist.push({
              id: new Date().getTime(),
              todo: this.todo,
              completed: false,
            });
            this.todo = '';
          },
          deleteTodo(id) {},
          toggleCompleted(id) {},
        },
      }).mount('#app');
    </script>
  </body>
</html>
